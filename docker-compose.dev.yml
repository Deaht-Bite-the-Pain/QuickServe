# ============================================================
#  QuickServe — MODO DESARROLLO
#  Solo levanta MySQL. Los microservicios corren desde IntelliJ
#  y el frontend corre con: ng serve --proxy-config proxy.conf.json
#
#  Uso:
#    docker-compose -f docker-compose.dev.yml up -d
#    docker-compose -f docker-compose.dev.yml down
# ============================================================

services:

  mysql:
    image: mysql:8.0
    container_name: quickserve-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: TuNuevaClave123
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - quickserve-mysql-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=TuNuevaClave123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  quickserve-mysql-data:
    name: quickserve-mysql-data
