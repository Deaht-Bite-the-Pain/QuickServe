<div class="qa-login">

  <!-- ── LEFT — dark visual panel ─────────────────────── -->
  <div class="qa-login-visual">
    <div class="qa-login-photo"></div>
    <span class="qa-login-brand">QuickServe</span>
    <div class="qa-login-tagline">
      <h2>
        Gestión de pedidos
        <em>rápida y eficiente</em>
      </h2>
      <span class="qa-login-mono">— La excelencia en cada slice</span>
    </div>
  </div>

  <!-- ── RIGHT — form panel ────────────────────────────── -->
  <div class="qa-login-form-wrap">
    <form class="qa-login-form" (ngSubmit)="onLogin()" novalidate>

      <h1>Iniciar sesión</h1>
      <p class="qa-login-sub">Ingresá tus credenciales de personal para acceder al sistema.</p>

      <div class="qa-login-fields">

        <!-- Email -->
        <div class="qa-input-grp" [class.qa-input-grp--err]="errors.email">
          <label class="qa-input-lbl">
            <span>Correo electrónico</span>
          </label>
          <div class="qa-input-wrap" [class.qa-input-wrap--err]="errors.email">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>
            </svg>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="tu@correo.com"
              autocomplete="email"
              (blur)="validateEmail()"
              (input)="errors.email = undefined"
            />
          </div>
          <span class="qa-field-err" *ngIf="errors.email">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errors.email }}
          </span>
        </div>

        <!-- Password -->
        <div class="qa-input-grp" [class.qa-input-grp--err]="errors.password">
          <label class="qa-input-lbl">
            <span>Contraseña</span>
          </label>
          <div class="qa-input-wrap" [class.qa-input-wrap--err]="errors.password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              (blur)="validatePassword()"
              (input)="errors.password = undefined"
            />
            <button type="button" class="qa-eye" (click)="togglePassword()" aria-label="Toggle password">
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="qa-field-err" *ngIf="errors.password">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errors.password }}
          </span>
        </div>

      </div>

      <!-- Error general (credenciales / servidor) -->
      <div class="qa-login-error" *ngIf="errors.general">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.general }}
      </div>

      <!-- Submit -->
      <button type="submit" class="qa-login-btn" [disabled]="loading">
        <svg *ngIf="!loading" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 4h-4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4M16 8l4 4-4 4M9 12h11"/>
        </svg>
        <svg *ngIf="loading" class="qa-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             style="animation: qsSpin .8s linear infinite;">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        {{ loading ? 'VERIFICANDO…' : 'INICIAR SESIÓN' }}
      </button>

      <div class="qa-login-foot">
        <small>Propiedad de QuickServe</small>
        <a class="qa-login-back" routerLink="/">← Volver al inicio</a>
      </div>

    </form>
  </div>

</div>
