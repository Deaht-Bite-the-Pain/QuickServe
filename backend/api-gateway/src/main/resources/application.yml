server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/orders/**
        - id: menu-service
          uri: ${MENU_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/menu/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
        - id: report-service
          uri: ${REPORT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/reports/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/inventory/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
