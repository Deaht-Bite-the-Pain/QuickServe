server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
        - id: menu-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/menu/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
        - id: report-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/reports/**
        - id: inventory-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/inventory/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
